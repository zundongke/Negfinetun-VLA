# RISE-style RL post-training for the action-conditioned pi05 expert.
# Imagined rollouts in the OpenSora STDiT3 LIBERO-Spatial world model, with
# advantages bootstrapped from the RISE-trained progress value model.
#
# Architecture:
#   - actor   : pi05 + action-cond port, init from joint SFT (runner.ckpt_path)
#   - rollout : same model, called inside the worldmodel env;
#               group_size > 1 forks group_size action samples from each starting obs
#               (= "(obs, action_i, reward_i)" per-sample collection, RISE-style)
#   - env     : worldmodel → OpenSoraWorldModelInference (STDiT3+VAE+ResNet RM)
#   - value   : separate RISE PI0Pytorch progress value model loaded in the
#               rollout worker (runner.value_model_path); produces V(s) for GAE
#   - loss    : diffusion-nft-actor + GAE advantage with V(s) bootstrap

defaults:
  - env/worldmodel_libero_spatial@env.train
  - env/worldmodel_libero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_rise_actor_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 300
  max_steps: -1

  only_eval: False
  val_check_interval: 20
  save_interval: 20

  resume_dir: null
  ckpt_path: "logs/sft_libero_spatial_20260501-074344/libero_spatial_sft_actor_openpi_pi05/checkpoints/global_step_30000/actor/model_state_dict/full_weights.pt"

  # RISE-trained progress value model (PI0Pytorch with with_value_head=True).
  # Loaded by huggingface_worker.init_worker; produces V(s) per rollout step
  # and overrides result["prev_values"] before it reaches the buffer.
  value_model_path: "RISE/policy_and_value/policy_offline_and_value/checkpoints/value_release_libero_spatial/value_release_libero_spatial/3000"

algorithm:
  # GAE with V(s) bootstrap from the RISE value model.
  adv_type: gae
  loss_type: diffusion-nft-actor
  diffusion_nft:
    beta: 0.5
    adv_clip_max: 1.0
    kl_beta: 1.0e-4
    reference_mode: v_old
  kl_beta: 1.0e-4

  normalize_advantages: True
  kl_penalty: kl
  # Multi-sample per starting obs ("(obs, a_i, r_i)" collection).
  # group_size > 1 → WM env's reset_state_ids are repeated so all envs in a group
  # start from the same initial state but sample independent actions.
  group_size: 4
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1
  loss_agg_func: "token-mean"
  nft_beta: 1.0
  clip_ratio_high: 1.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  base: 0.1
  target: 0.995
  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    # 8 envs / group_size=4 → 2 distinct starting states, 4 sampled trajectories each.
    total_num_envs: 8
    num_envs: 8
    max_episode_steps: 240
  eval:
    total_num_envs: 8
    num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    is_eval: True
    video_cfg:
      save_video: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "checkpoints/torch/pi05_base"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 64
  seed: 42
  enable_offload: False
  model:
    model_path: "checkpoints/torch/pi05_base"
    num_action_chunks: 4         # matches WM pad_action_num for per-step bookkeeping
    add_value_head: False        # actor has no value head — V(s) comes from the RISE value model
    openpi:
      detach_critic_input: True
      use_nft_loss: True
      solver_type: "flow_sde"
      noise_level: 0.2
      action_cond_enabled: true
      action_cond_dropout_prob: 0.5
      refine_iters: 0
  optim:
    lr: 1.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
