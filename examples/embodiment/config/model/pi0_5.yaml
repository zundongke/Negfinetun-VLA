model_type: "openpi"

# Model path - should be set in specific config files
model_path: "/path/to/model/openpi"

precision: null # for openpi, precision is null, please do not change this value

# Action and chunk settings
num_action_chunks: 10
action_dim: 7

# LoRA settings
is_lora: False
lora_rank: 32

# Training settings
use_proprio: True
num_steps: 4
add_value_head: False

# openpi specific parameters
openpi:
  config_name: "pi05_libero"
  num_images_in_input: 2
  noise_level: 0.5
  action_chunk: ${actor.model.num_action_chunks}
  num_steps: ${actor.model.num_steps}
  train_expert_only: True
  action_env_dim: ${actor.model.action_dim}
  solver_type: "flow_sde"
  add_value_head: ${actor.model.add_value_head}
  value_after_vlm: False
  value_vlm_mode: "mean_token"
  detach_critic_input: null
  # Action-conditioning: adds a_cond token block before the action tokens.
  # Zero-init of action_cond_in_proj makes the feature dormant at load-time,
  # so existing SFT checkpoints produce bit-for-bit baseline output until trained.
  action_cond_enabled: true        # false => skip the extra tokens entirely (kill-switch)
  action_cond_dropout_prob: 0.5    # CFG-style dropout on a_cond during training
  refine_iters: 0                  # 0 => one pass; N>0 => N refinement passes at inference